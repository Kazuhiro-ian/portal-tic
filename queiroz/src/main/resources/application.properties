# Configurações de Conexão com o PostgreSQL
# ATENÇÃO: nenhum segredo deve ficar hardcoded aqui. Defina DB_PASSWORD, JWT_SECRET, CREDENCIAL_ENC_KEY
# como variáveis de ambiente do sistema/processo antes de subir a aplicação (não há valor default para
# essas três — a aplicação falha ao iniciar se estiverem ausentes, de propósito).
spring.datasource.url=jdbc:postgresql://localhost:5432/portal_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate/JPA
# update: cria e atualiza as tabelas automaticamente baseado nas suas classes Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Autenticação / JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# Criptografia em repouso do cofre de credenciais (chave AES-256 em base64, 32 bytes decodificados)
credencial.encryption.key=${CREDENCIAL_ENC_KEY}

# CORS - origens permitidas (separadas por vírgula)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://172.128.100.104:5173}

# Bootstrap do usuário administrador inicial (só é usado se a tabela de usuários estiver vazia)
admin.bootstrap.username=${ADMIN_BOOTSTRAP_USERNAME:admin}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}